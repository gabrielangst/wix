function toggleSecao(id) {
  const secao = document.getElementById(id);
  const botao = document.querySelector(`button[onclick="toggleSecao('${id}')"]`);

  const isOpen = secao.style.display === "block";
  secao.style.display = isOpen ? "none" : "block";

  if (botao) {
    botao.classList.toggle("ativo", !isOpen);
  }
}

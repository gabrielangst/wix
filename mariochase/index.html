<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mario Chase - Arena Teste</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. CENA E CÂMERA
        const cena = new THREE.Scene();
        cena.background = new THREE.Color(0x5cb8ff); // Azul claro vibrante (estilo Nintendo)
        
        // Câmera posicionada um pouco mais alta para ver por cima dos obstáculos
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15); 
        camera.lookAt(0, 0, 0);

        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        renderizador.shadowMap.enabled = true; // ATIVANDO AS SOMBRAS!
        document.body.appendChild(renderizador.domElement);

        // 2. O CHÃO (Uma arena com grama sintética e um grid)
        const chaoGeo = new THREE.PlaneGeometry(40, 40);
        const chaoMat = new THREE.MeshStandardMaterial({ color: 0x82c832 }); // Verde Mario
        const chao = new THREE.Mesh(chaoGeo, chaoMat);
        chao.rotation.x = -Math.PI / 2;
        chao.receiveShadow = true; // O chão recebe a sombra de tudo
        cena.add(chao);

        const grid = new THREE.GridHelper(40, 40, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        cena.add(grid);

        // 3. OBSTÁCULOS (Os bloquinhos coloridos do labirinto)
        const coresBlocos = [0xff0000, 0x0000ff, 0xffff00, 0xffa500]; // Vermelho, azul, amarelo, laranja
        for(let i = 0; i < 20; i++) {
            const blocoGeo = new THREE.BoxGeometry(2, 2, 2);
            const cor = coresBlocos[Math.floor(Math.random() * coresBlocos.length)];
            const blocoMat = new THREE.MeshStandardMaterial({ color: cor });
            const bloco = new THREE.Mesh(blocoGeo, blocoMat);
            
            // Espalha aleatoriamente pelo mapa
            bloco.position.x = (Math.random() - 0.5) * 30;
            bloco.position.z = (Math.random() - 0.5) * 30;
            bloco.position.y = 1; // Fica em cima do chão
            bloco.castShadow = true; // O bloco faz sombra
            cena.add(bloco);
        }

        // 4. ILUMINAÇÃO (O segredo do gráfico bonito)
        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.6); // Luz suave global
        cena.add(luzAmbiente);

        const luzSol = new THREE.DirectionalLight(0xffffff, 1.5); // Luz do "sol"
        luzSol.position.set(10, 20, 10);
        luzSol.castShadow = true; // O sol gera sombras dinâmicas
        luzSol.shadow.mapSize.width = 1024; // Deixa a sombra em alta resolução
        luzSol.shadow.mapSize.height = 1024;
        cena.add(luzSol);

        

        let personagem; 
        let mixer; 
        const relogio = new THREE.Clock();
        let anguloCamera = 0; 
        let alturaCamera = 5;
        let fazendoDash = false; // Avisa se o Mário está voando no ar
        let tempoDash = 0;       // Cronômetro do bote
        const duracaoDash = 0.5; // O bote vai durar exato meio segundo
        const tempoEsperaDash = 1.5; // O tempo de recarga em segundos
        let tempoUltimoDash = -tempoEsperaDash; // Começa negativo para você poder pular logo que o jogo abre!
        
        const somPulo = new Audio('pulo.mp3'); // Carrega o seu arquivo de som
        somPulo.volume = 1.0; // Deixa o volume em 50% para não estourar o ouvido


        // 5. CARREGANDO O MÁRIO
        const distanciaCamera = 10;

        const carregador = new GLTFLoader();

        carregador.load('mario.glb', function (gltf) {
            personagem = gltf.scene;
            personagem.scale.set(0.5, 0.5, 0.5); 
            personagem.position.y = 0; 
            
            personagem.traverse(function (filho) {
                if (filho.isMesh) {
                    filho.castShadow = true;
                    filho.receiveShadow = true;
                }
            });

            cena.add(personagem);

            // --- CÓDIGO NOVO: INICIANDO A ANIMAÇÃO ---
            // Verifica se o arquivo .glb trouxe alguma animação na "mala"
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(personagem);
                
                // Pega a primeira animação da lista (índice 0)
                const acao = mixer.clipAction(gltf.animations[0]);
                
                // Dá o play!
                acao.play(); 
            }
            
        }, undefined, function (erro) {
            console.error('Erro ao carregar o modelo:', erro);
        });      

        // 6. CONTROLES DO TECLADO
        // Um objeto para guardar o estado de cada tecla (true = pressionada, false = solta)
        const teclas = { 
            w: false, a: false, s: false, d: false, 
            arrowup: false, arrowdown: false, arrowleft: false, arrowright: false, 
            ' ': false //catch barra de espaço
        };

        // Quando uma tecla é ABAIXADA, marcamos como true
        window.addEventListener('keydown', (evento) => {
            const teclaPressionada = evento.key.toLowerCase();
            if (teclas.hasOwnProperty(teclaPressionada)) {
                teclas[teclaPressionada] = true;
            }
        });

        // Quando a tecla é SOLTA, marcamos como false
        window.addEventListener('keyup', (evento) => {
            const teclaSolta = evento.key.toLowerCase();
            if (teclas.hasOwnProperty(teclaSolta)) {
                teclas[teclaSolta] = false;
            }
        });

        // Definimos a distância que a câmera vai ficar do personagem
        // (x: 0, y: 5 de altura, z: 10 de distância para trás)
        const cameraOffset = new THREE.Vector3(0, 5, 10);

        // 7. O LOOP DE ANIMAÇÃO
        function animar() {
            requestAnimationFrame(animar);

            const tempoDecorrido = relogio.getDelta();
            if (mixer) {
                mixer.update(tempoDecorrido);
            }

            /// Pega o tempo total que o jogo está rodando em segundos
                const tempoAtual = relogio.getElapsedTime();

                // --- 1. A LÓGICA DO BOTE (DASH) ---
                // Verifica: Apertou espaço? NÃO está voando? O cooldown de 3s já passou?
                if (teclas[' '] && !fazendoDash && (tempoAtual - tempoUltimoDash >= tempoEsperaDash)) {
                    fazendoDash = true;
                    tempoDash = 0;
                    tempoUltimoDash = tempoAtual; // Grava a hora exata que você usou a habilidade
                    
                    // Dispara o som
                    somPulo.currentTime = 0; // Se o som for longo, isso faz ele recomeçar do zero
                    somPulo.play();
                }

                if (fazendoDash) {
                    // ... (Todo o seu código matemático de voar para frente e girar a barriga continua exatamente igual aqui!) ...
                    tempoDash += tempoDecorrido;
                    const progresso = tempoDash / duracaoDash; 
                    const velocidadeDash = 0.4; 

                    personagem.position.x += Math.sin(personagem.rotation.y) * velocidadeDash;
                    personagem.position.z += Math.cos(personagem.rotation.y) * velocidadeDash;

                    personagem.position.y = Math.sin(progresso * Math.PI) * 1.5; 
                    personagem.rotation.x = (Math.PI / 2.5) * Math.sin(progresso * Math.PI);

                    if (tempoDash >= duracaoDash) {
                        fazendoDash = false;
                        personagem.position.y = 0; 
                        personagem.rotation.x = 0; 
                    }

                } else {
                    // --- 2. MOVIMENTO NORMAL (SÓ RODA SE NÃO ESTIVER DANDO O BOTE) ---
                    const velocidade = 0.15;
                    let inputX = 0;
                    let inputZ = 0;
                    
                    if (teclas['w']) inputZ -= 1;
                    if (teclas['s']) inputZ += 1;
                    if (teclas['a']) inputX -= 1;
                    if (teclas['d']) inputX += 1;

                    if (inputX !== 0 || inputZ !== 0) {
                        const tamanhoMovi = Math.sqrt(inputX * inputX + inputZ * inputZ);
                        inputX = (inputX / tamanhoMovi) * velocidade;
                        inputZ = (inputZ / tamanhoMovi) * velocidade;

                        const cos = Math.cos(anguloCamera);
                        const sin = Math.sin(anguloCamera);

                        const movimentoX = inputX * cos + inputZ * sin;
                        const movimentoZ = -inputX * sin + inputZ * cos;

                        personagem.position.x += movimentoX;
                        personagem.position.z += movimentoZ;

                        const anguloDestino = Math.atan2(movimentoX, movimentoZ);
                        
                        let diffPers = anguloDestino - personagem.rotation.y;
                        while(diffPers > Math.PI) diffPers -= Math.PI * 2;
                        while(diffPers < -Math.PI) diffPers += Math.PI * 2;
                        personagem.rotation.y += diffPers * 0.2;

                        // Câmera Auto-seguidora
                        const anguloCostas = anguloDestino + Math.PI;
                        let diffCam = anguloCostas - anguloCamera;
                        while(diffCam > Math.PI) diffCam -= Math.PI * 2;
                        while(diffCam < -Math.PI) diffCam += Math.PI * 2;
                        anguloCamera += diffCam * 0.02; 
                   }
                 // Final do Else do Movimento Normal

                // 3. CONTROLE MANUAL DA CÂMERA (Pode olhar em volta livremente)
                const velocidadeGiroCamera = 0.05;
                if (teclas['arrowleft']) anguloCamera += velocidadeGiroCamera;
                if (teclas['arrowright']) anguloCamera -= velocidadeGiroCamera;
                if (teclas['arrowup'] && alturaCamera > 2) alturaCamera -= 0.1;
                if (teclas['arrowdown'] && alturaCamera < 8) alturaCamera += 0.1;

                // 4. POSICIONAMENTO FINAL DA CÂMERA
                const alvoX = personagem.position.x + Math.sin(anguloCamera) * distanciaCamera;
                const alvoZ = personagem.position.z + Math.cos(anguloCamera) * distanciaCamera;
                const alvoY = personagem.position.y + alturaCamera;

                camera.position.x = THREE.MathUtils.lerp(camera.position.x, alvoX, 0.1);
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, alvoY, 0.1);
                camera.position.z = THREE.MathUtils.lerp(camera.position.z, alvoZ, 0.1);
                
                camera.lookAt(personagem.position.x, personagem.position.y + 2, personagem.position.z);
            }

            renderizador.render(cena, camera);
        }
        animar();

    </script>
</body>
</html>
